<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCM Video Intake — University of Pittsburgh</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #003594;
      --blue-dark: #002570;
      --blue-light: #D0DAEA;
      --gold: #CFA820;
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text2: #555555;
      --text3: #888888;
      --red: #cc0000;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    body {
      font-family: var(--font);
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 48px;
    }
    .page-header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-header img {
      height: 36px;
    }
    .page-header-text p {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
    }
    .page-header-text span {
      font-size: 11px;
      color: var(--text3);
    }
    #app {
      width: 100%;
      max-width: 640px;
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      height: 680px;
      overflow: hidden;
    }
    #hdr {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .av {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--blue);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .av i { color: #fff; font-size: 18px; }
    .hi p { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .hi span { font-size: 11px; color: var(--text3); }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg { max-width: 85%; display: flex; flex-direction: column; gap: 3px; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .lbl { font-size: 11px; color: var(--text3); padding: 0 3px; }
    .user .lbl { text-align: right; }
    .bub {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .bot .bub {
      background: var(--bg2);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }
    .user .bub {
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    #ftr {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .prg { display: flex; gap: 5px; margin-bottom: 9px; }
    .pd {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: background .3s;
    }
    .pd.done { background: var(--blue); }
    .pd.active { background: var(--blue); opacity: .45; }
    #ir { display: flex; gap: 8px; align-items: flex-end; }
    #inp {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: var(--font);
      resize: none;
      min-height: 38px;
      max-height: 100px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      line-height: 1.45;
    }
    #inp:focus { border-color: var(--blue); }
    #sb {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: none;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    #sb:hover { background: var(--blue-dark); }
    #sb:disabled { background: var(--bg2); color: var(--text3); cursor: default; }
    .typing {
      display: flex; gap: 4px; align-items: center;
      padding: 10px 14px;
      background: var(--bg2);
      border-radius: 16px;
      border-bottom-left-radius: 3px;
      width: fit-content;
    }
    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text3);
      animation: dt 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes dt {
      0%,80%,100% { transform: scale(.65); opacity: .4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .arow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .abtn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13.5px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font);
      text-decoration: none;
      transition: background .15s;
    }
    .abtn:hover { background: var(--bg2); }
    .abtn.pri {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .abtn.pri:hover { background: var(--blue-dark); }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="av" style="border-radius:8px;width:40px;height:40px;">
      <i class="ti ti-video" style="color:#fff;font-size:20px;"></i>
    </div>
    <div class="page-header-text">
      <p>UCM Video Project Intake</p>
      <span>University of Pittsburgh — University Communications &amp; Marketing</span>
    </div>
  </div>

  <div id="app">
    <div id="hdr">
      <div class="av"><i class="ti ti-message-circle"></i></div>
      <div class="hi">
        <p>Video Intake Assistant</p>
        <span>Answer a few questions to kick off your project</span>
      </div>
    </div>
    <div id="chat"></div>
    <div id="ftr">
      <div class="prg" id="prg"></div>
      <div id="ir">
        <textarea id="inp" placeholder="Type your answer..." rows="1"></textarea>
        <button id="sb" aria-label="Send message"><i class="ti ti-arrow-up"></i></button>
      </div>
    </div>
  </div>

  <script>
  const QS = [
    { key: "name_dept",    q: "Hi there! I'm here to help kick off your video project with University Communications & Marketing. This'll just take a few minutes.\n\nWhat's your name and department?" },
    { key: "description",  q: "Great, thanks! Tell me about the video — what's the idea, who do you want to watch it, and where will it live once it's done? (Website, social, an event, internal use, etc.)" },
    { key: "key_points",   q: "What are the two or three main things you want viewers to walk away knowing or feeling? One sentence each is perfect." },
    { key: "project_type", q: "Which best describes the video type?\n\n• Interview / Q&A\n• Leadership message\n• B-roll / stock footage\n• Feature / profile\n• Sizzle reel\n• Other (just describe it)" },
    { key: "audience",     q: "Who is the audience? List all that apply:\n\n• Undergraduate students\n• Graduate students\n• Faculty / Staff\n• Alumni\n• Parents\n• Prospective students\n• General audience" },
    { key: "subjects",     q: "Who do you want on camera? For each person, share their name, contact info if you have it, and what you'd want them to speak to." },
    { key: "style",        q: "Do you have a style or feel in mind? Think adjectives, references to other videos, or just a vibe. Also mention anything you'd like to avoid." },
    { key: "logistics",    q: "A few logistics:\n\n• Preferred shoot date?\n• When do you need the finished video by?\n• Any existing files — logos, scripts, b-roll?" },
    { key: "channels",     q: "Where will this video be distributed, and roughly how long should it be? (e.g. Pitt website + social, around 2 minutes)" },
    { key: "contact",      q: "Last one — what's the best email and phone number to reach you at for this project?" }
  ];

  const state = { step: 0, answers: {} };
  const chat = document.getElementById('chat');
  const inp  = document.getElementById('inp');
  const sb   = document.getElementById('sb');
  const prg  = document.getElementById('prg');

  function buildPrg() {
    prg.innerHTML = '';
    QS.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'pd' + (i < state.step - 1 ? ' done' : i === state.step - 1 ? ' active' : '');
      prg.appendChild(d);
    });
  }

  function scrollBot() { setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50); }

  function addMsg(text, role) {
    const w = document.createElement('div'); w.className = 'msg ' + role;
    const l = document.createElement('div'); l.className = 'lbl'; l.textContent = role === 'bot' ? 'UCM Video' : 'You';
    const b = document.createElement('div'); b.className = 'bub'; b.textContent = text;
    w.appendChild(l); w.appendChild(b); chat.appendChild(w); scrollBot(); return w;
  }

  function showTyping() {
    const w = document.createElement('div'); w.className = 'msg bot'; w.id = 'typ';
    const t = document.createElement('div'); t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    w.appendChild(t); chat.appendChild(w); scrollBot();
  }
  function removeTyping() { const t = document.getElementById('typ'); if (t) t.remove(); }

  function botSay(text, delay = 500) {
    return new Promise(res => { showTyping(); setTimeout(() => { removeTyping(); addMsg(text, 'bot'); res(); }, delay); });
  }

  // ── PDF ENGINE ──────────────────────────────────────────────────────────────

  function esc(s) { return String(s || '').replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }

  function wrapLines(text, maxChars) {
    if (!text) return ['[MISSING]'];
    const out = [];
    for (const para of text.split('\n')) {
      if (!para.trim()) { out.push(''); continue; }
      const words = para.split(' ');
      let line = '';
      for (const w of words) {
        if ((line + ' ' + w).trim().length > maxChars) { if (line) out.push(line.trim()); line = w; }
        else line = (line + ' ' + w).trim();
      }
      if (line) out.push(line);
    }
    return out.length ? out : ['[MISSING]'];
  }

  function makePDF(a) {
    const PW = 612, PH = 792, ML = 50, MR = 50, CW = PW - ML - MR;
    const BLUE='0.008 0.212 0.573', LBLUE='0.820 0.855 0.918', LGRAY='0.949 0.949 0.949';
    const WHITE='1 1 1', BLACK='0 0 0', RED='0.8 0 0', MGRAY='0.5 0.5 0.5', GOLD='0.600 0.490 0.020';

    const pages = [];
    let ops = [], cy = PH - 50;

    function newPage() { pages.push([...ops]); ops = []; cy = PH - 50; }
    function checkSpace(n) { if (cy - n < 55) newPage(); }

    function fillRect(x,y,w,h,rgb) { ops.push(`${rgb} rg ${x} ${y} ${w} ${h} re f`); }
    function strokeRect(x,y,w,h,lw=0.5) { ops.push(`${lw} w 0.75 0.75 0.75 RG ${x} ${y} ${w} ${h} re S`); }
    function txt(t,x,y,font,size,rgb=BLACK) { ops.push(`BT /${font} ${size} Tf ${rgb} rg ${x} ${y} Td (${esc(t)}) Tj ET`); }

    function checkbox(x,y,checked) {
      strokeRect(x, y, 10, 10, 0.5);
      if (checked) ops.push(`0.008 0.212 0.573 rg ${x+2} ${y+2} 6 6 re f`);
    }

    function sectionBar(label) {
      checkSpace(24);
      fillRect(ML, cy-16, CW, 18, BLUE);
      txt(label, ML+6, cy-11, 'Hb', 9, WHITE);
      cy -= 24;
    }

    function fieldRow(label, value, lw=140, missing=false) {
      checkSpace(22);
      fillRect(ML, cy-16+2, lw, 18, LBLUE);
      fillRect(ML+lw, cy-16+2, CW-lw, 18, WHITE);
      strokeRect(ML, cy-16+2, lw, 18);
      strokeRect(ML+lw, cy-16+2, CW-lw, 18);
      txt(label, ML+4, cy-11, 'Hb', 8, BLACK);
      const val = value || '[MISSING]';
      const isMiss = !value;
      txt(val.length > 68 ? val.substring(0,68)+'...' : val, ML+lw+5, cy-11, isMiss?'Hb':'Hr', 8, isMiss?RED:BLACK);
      cy -= 20;
    }

    function textBlock(label, value) {
      const lines = wrapLines(value, 82);
      const bh = Math.max(32, lines.length * 13 + 16);
      checkSpace(bh + 20);
      fillRect(ML, cy-14, CW, 14, LBLUE); strokeRect(ML, cy-14, CW, 14);
      txt(label, ML+5, cy-10, 'Hb', 8, BLACK);
      cy -= 14;
      const isMiss = !value;
      fillRect(ML, cy-bh, CW, bh, WHITE); strokeRect(ML, cy-bh, CW, bh);
      lines.forEach((line, i) => { txt(line, ML+6, cy-13-(i*13), isMiss?'Hb':'Hr', 8.5, isMiss?RED:BLACK); });
      cy -= (bh + 6);
    }

    // Title banner
    fillRect(ML, cy-44, CW, 46, BLUE);
    txt('VIDEO PRE-PRODUCTION CREATIVE BRIEF', ML+10, cy-18, 'Hb', 13, WHITE);
    txt('University Communications & Marketing  —  University of Pittsburgh', ML+10, cy-31, 'Hr', 8, '0.75 0.85 1.0');
    cy -= 54;

    // Instructions box
    checkSpace(44);
    fillRect(ML, cy-40, CW, 42, '0.937 0.949 0.969');
    strokeRect(ML, cy-40, CW, 42);
    ops.push(`0.4 w ${GOLD} RG ${ML} ${cy+2} m ${ML} ${cy-40} l S`);
    txt('This PDF is editable. Please review, fill in any missing details, and email to:', ML+8, cy-11, 'Hr', 8.5, BLACK);
    txt('Jim Vastine:  jvastine@pitt.edu', ML+8, cy-24, 'Hb', 8.5, BLUE);
    txt('Brad King:  bradking@pitt.edu', ML+230, cy-24, 'Hb', 8.5, BLUE);
    txt('Questions? Contact UCM at (412) 624-0000', ML+8, cy-36, 'Hr', 7.5, MGRAY);
    cy -= 50;

    // Project Details
    sectionBar('PROJECT DETAILS');
    fieldRow('Requested By / Dept', a.name_dept, 155, !a.name_dept);
    fieldRow('Primary Contact', a.contact, 155, !a.contact);

    checkSpace(22);
    const hw = CW / 2;
    const sd = extractDate(a.logistics, 'shoot');
    const dd = extractDate(a.logistics, 'due');
    fillRect(ML, cy-14, 75, 18, LBLUE); fillRect(ML+75, cy-14, hw-75, 18, WHITE);
    fillRect(ML+hw, cy-14, 75, 18, LBLUE); fillRect(ML+hw+75, cy-14, hw-75, 18, WHITE);
    strokeRect(ML, cy-14, 75, 18); strokeRect(ML+75, cy-14, hw-75, 18);
    strokeRect(ML+hw, cy-14, 75, 18); strokeRect(ML+hw+75, cy-14, hw-75, 18);
    txt('Shoot Date', ML+4, cy-9, 'Hb', 8, BLACK);
    txt(sd||'[MISSING]', ML+79, cy-9, sd?'Hr':'Hb', 8, sd?BLACK:RED);
    txt('Due Date', ML+hw+4, cy-9, 'Hb', 8, BLACK);
    txt(dd||'[MISSING]', ML+hw+79, cy-9, dd?'Hr':'Hb', 8, dd?BLACK:RED);
    cy -= 24;

    fieldRow('Files from Partner', extractFiles(a.logistics), 155, !extractFiles(a.logistics));
    fieldRow('Videographer Assigned', '', 155, true);
    cy -= 4;

    // Project Type
    sectionBar('PROJECT TYPE  (check one)');
    const types = ['Interview / Q&A','Leadership Message','B-Roll / Stock Footage','Feature / Profile','Sizzle Reel','Other'];
    const pt = (a.project_type || '').toLowerCase();
    types.forEach((t, i) => {
      checkSpace(18);
      fillRect(ML, cy-14, CW, 16, i%2===0?WHITE:LGRAY); strokeRect(ML, cy-14, CW, 16);
      const checked = pt.includes(t.toLowerCase().split(' ')[0].toLowerCase()) ||
        (t==='Other' && pt.length>3 && !types.slice(0,-1).some(x=>pt.includes(x.toLowerCase().split(' ')[0])));
      checkbox(ML+6, cy-12, checked);
      txt(t, ML+22, cy-10, checked?'Hb':'Hr', 8.5, checked?BLUE:BLACK);
      cy -= 16;
    });
    cy -= 6;

    // Audience
    sectionBar('AUDIENCE  (check all that apply)');
    const auds = ['Undergraduate Students','Graduate Students','Faculty','Staff','Alumni','Parents','Prospective Students','General Audience'];
    const au = (a.audience || '').toLowerCase();
    auds.forEach((t, i) => {
      checkSpace(18);
      fillRect(ML, cy-14, CW, 16, i%2===0?WHITE:LGRAY); strokeRect(ML, cy-14, CW, 16);
      const checked = au.includes(t.toLowerCase().split(' ')[0]);
      checkbox(ML+6, cy-12, checked);
      txt(t, ML+22, cy-10, checked?'Hb':'Hr', 8.5, checked?BLUE:BLACK);
      cy -= 16;
    });
    cy -= 6;

    // Distribution
    sectionBar('DISTRIBUTION');
    const ch = a.channels || '';
    const len = extractLength(ch);
    fieldRow('Use / Channels', ch ? ch.replace(len||'','').replace(/,\s*$/,'').trim() : '', 140, !ch);
    fieldRow('Expected Length', len||'', 140, !len);
    cy -= 4;

    // Narrative sections
    sectionBar('PROJECT DESCRIPTION');
    textBlock('What is this video, who will watch it, and where will it live? (3–5 sentences)', a.description);

    sectionBar('KEY POINTS');
    textBlock('Major messages — one sentence each', a.key_points);

    // Interview Subjects
    sectionBar('INTERVIEW SUBJECTS');
    checkSpace(20);
    const scols = [140, 130, CW-270];
    ['Name','Contact','Key Point to Discuss'].forEach((h, i) => {
      const x = ML + (i===0?0:i===1?scols[0]:scols[0]+scols[1]);
      fillRect(x, cy-14, scols[i], 14, BLUE); strokeRect(x, cy-14, scols[i], 14);
      txt(h, x+4, cy-10, 'Hb', 8, WHITE);
    });
    cy -= 14;
    const subLines = wrapLines(a.subjects||'[MISSING]', 90);
    const sbh = Math.max(48, subLines.length*13+16);
    checkSpace(sbh);
    fillRect(ML, cy-sbh, CW, sbh, WHITE); strokeRect(ML, cy-sbh, CW, sbh);
    subLines.forEach((line, i) => { txt(line, ML+5, cy-13-(i*13), !a.subjects?'Hb':'Hr', 8.5, !a.subjects?RED:BLACK); });
    cy -= (sbh + 6);

    sectionBar('AESTHETIC STYLE');
    textBlock('Visual or tonal direction — adjectives, references, mood. What to avoid.', a.style);

    sectionBar('SCOPE');
    textBlock('What this SHOULD be', extractScope(a.style,'pos') || a.style || null);
    textBlock('What this should NOT be', extractScope(a.style,'neg') || null);

    // Approval Workflow
    checkSpace(140);
    sectionBar('APPROVAL WORKFLOW');
    const acols = [208,128,118,58];
    let ax = ML;
    ['Stage','Who','Sign-Off Names','Date'].forEach((h, i) => {
      fillRect(ax, cy-14, acols[i], 14, BLUE); strokeRect(ax, cy-14, acols[i], 14);
      txt(h, ax+4, cy-10, 'Hb', 8, WHITE); ax += acols[i];
    });
    cy -= 14;
    [
      ['Intake — Brief Approved','Creative Director + Client'],
      ['Pre-Production — Treatment, Script, Logistics','UCM + Client'],
      ['Post: Rough Cut','UCM'],
      ['Post: Early Cut','UCM + Client'],
      ['Final Cut + Close Out','Creative Director + Client'],
    ].forEach(([stage,who], i) => {
      checkSpace(18);
      ax = ML;
      acols.forEach(cw => { fillRect(ax, cy-14, cw, 16, i%2===0?WHITE:LGRAY); strokeRect(ax, cy-14, cw, 16); ax += cw; });
      txt(stage, ML+4, cy-10, 'Hr', 7.5, BLACK);
      txt(who, ML+acols[0]+4, cy-10, 'Hr', 7.5, BLACK);
      cy -= 16;
    });

    newPage(); // flush last page

    // Footers
    pages.forEach((pg, i) => {
      pg.push(`0.5 w 0.85 0.85 0.85 RG ${ML} 42 m ${PW-MR} 42 l S`);
      pg.push(`BT /Hr 7 Tf 0.55 0.55 0.55 rg ${ML} 30 Td (University Communications & Marketing  |  Video Pre-Production Brief  |  Page ${i+1} of ${pages.length}) Tj ET`);
    });

    // Build PDF binary
    const enc = new TextEncoder();
    const parts = []; let offset = 0; const offsets = [];
    function w(s) { const b = enc.encode(s); parts.push(b); offset += b.length; }

    w('%PDF-1.4\n');
    offsets[1] = offset; w(`1 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>\nendobj\n`);
    offsets[2] = offset; w(`2 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>\nendobj\n`);

    const contentIds = [];
    pages.forEach((pg, idx) => {
      const id = idx + 3; contentIds.push(id);
      const stream = pg.join('\n');
      offsets[id] = offset;
      w(`${id} 0 obj\n<< /Length ${enc.encode(stream).length} >>\nstream\n${stream}\nendstream\nendobj\n`);
    });

    const pageObjIds = [];
    pages.forEach((_, i) => {
      const id = pages.length + 3 + i; pageObjIds.push(id);
      offsets[id] = offset;
      w(`${id} 0 obj\n<< /Type /Page /Parent ${pages.length*2+3} 0 R /MediaBox [0 0 ${PW} ${PH}] /Contents ${contentIds[i]} 0 R /Resources << /Font << /Hr 1 0 R /Hb 2 0 R >> >> >>\nendobj\n`);
    });

    const pdid = pages.length*2+3; offsets[pdid] = offset;
    w(`${pdid} 0 obj\n<< /Type /Pages /Kids [${pageObjIds.map(id=>`${id} 0 R`).join(' ')}] /Count ${pages.length} >>\nendobj\n`);

    const catid = pdid+1; offsets[catid] = offset;
    w(`${catid} 0 obj\n<< /Type /Catalog /Pages ${pdid} 0 R >>\nendobj\n`);

    const xrefOffset = offset;
    const maxId = catid;
    w(`xref\n0 ${maxId+1}\n0000000000 65535 f \n`);
    for (let i = 1; i <= maxId; i++) w(`${String(offsets[i]||0).padStart(10,'0')} 00000 n \n`);
    w(`trailer\n<< /Size ${maxId+1} /Root ${catid} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);

    const total = parts.reduce((s,p)=>s+p.length,0);
    const buf = new Uint8Array(total); let pos = 0;
    for (const p of parts) { buf.set(p, pos); pos += p.length; }
    return buf;
  }

  function extractDate(t, type) {
    if (!t) return null;
    const re = /(\b(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+\d{1,2}(?:,?\s*\d{4})?|\d{1,2}[\/\-]\d{1,2}(?:[\/\-]\d{2,4})?)/i;
    if (type === 'shoot') { const m = t.match(new RegExp('(?:shoot|film|record)[^.\\n]*?'+re.source,'i')); return m?m[1]:null; }
    const m = t.match(new RegExp('(?:due|finish|deliver|deadline|need)[^.\\n]*?'+re.source,'i')); return m?m[1]:null;
  }
  function extractFiles(t) {
    if (!t) return null;
    if (/no file|no asset|none|don.t have|do not have|nothing/i.test(t)) return 'None at this time';
    const m = t.match(/(?:have|share|include|attach|logo|script|footage|b.?roll)[^\n.]{0,60}/i);
    return m ? m[0].trim() : null;
  }
  function extractLength(t) {
    if (!t) return null;
    const m = t.match(/(\d+[:]\d{2}(?:\s*[-–]\s*\d+[:]\d{2})?|\b\d+(?:\.\d+)?\s*(?:min|minute|sec|second)s?)/i);
    return m ? m[0] : null;
  }
  function extractScope(t, dir) {
    if (!t) return null;
    if (dir === 'neg') { const m = t.match(/(?:avoid|not |no |don.t|without|never)[^\n.]{5,80}/i); return m?m[0].trim():null; }
    return null;
  }

  async function finish() {
    sb.disabled = true; inp.disabled = true;
    await botSay("That's everything — generating your brief now...", 600);
    try {
      const pdfBytes = makePDF(state.answers);
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);

      const w = document.createElement('div'); w.className = 'msg bot';
      const l = document.createElement('div'); l.className = 'lbl'; l.textContent = 'UCM Video';
      const b = document.createElement('div'); b.className = 'bub';
      b.textContent = "Your brief is ready! The PDF is editable — fill in anything still marked missing, then send it to the team.";
      w.appendChild(l); w.appendChild(b);

      const row = document.createElement('div'); row.className = 'arow';
      const dl = document.createElement('a');
      dl.className = 'abtn pri'; dl.href = url; dl.download = 'UCM_Video_Brief.pdf';
      dl.innerHTML = '<i class="ti ti-download"></i> Download brief PDF';
      row.appendChild(dl);
      w.appendChild(row);
      chat.appendChild(w);
      scrollBot(); buildPrg();

      await botSay("Once reviewed, email your brief to:\njvastine@pitt.edu  or  bradking@pitt.edu\n\nWe'll be in touch soon!", 900);
    } catch(e) {
      await botSay("Something went wrong generating the PDF: " + e.message, 400);
    }
  }

  async function advance(userText) {
    if (state.step === 0) { await botSay(QS[0].q, 300); state.step = 1; buildPrg(); return; }
    state.answers[QS[state.step-1].key] = userText;
    if (state.step < QS.length) { await botSay(QS[state.step].q); state.step++; buildPrg(); }
    else { await finish(); }
  }

  sb.addEventListener('click', send);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
  inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 100) + 'px'; });

  function send() {
    const t = inp.value.trim();
    if (!t || inp.disabled) return;
    addMsg(t, 'user'); inp.value = ''; inp.style.height = 'auto'; advance(t);
  }

  advance('');
  </script>
</body>
